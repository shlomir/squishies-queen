<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>מלכת הסקוויישים</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A6%84%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Square symbol-button size: driven by the SMALLER of width or height,
           using svh (smallest viewport) so it fits even with the browser URL bar shown. */
        :root { --btn: min(130px, 28vw, 14svh); }

        #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .star {
            position: absolute;
            clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
            background: #ffd700;
            animation: twinkle var(--dur,2s) ease-in-out infinite var(--delay,0s);
        }
        @keyframes twinkle {
            0%,100% { opacity:.15; transform:scale(.6); }
            50%      { opacity:1;   transform:scale(1.1); }
        }
        .blob {
            position: fixed; border-radius: 50%;
            filter: blur(60px); opacity: .25; pointer-events: none; z-index: 0;
        }

        body {
            min-height: 100svh;
            background: radial-gradient(ellipse at 50% 20%, #9b30ff 0%, #5b0fa0 30%, #2a0060 60%, #0d0030 100%);
            font-family: 'Arial Black', Arial, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;           /* safety net: scroll only if a viewport is too short to fit */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ── Reset button (shared, fixed) ── */
        .reset-btn {
            position: fixed; z-index: 5;
            top: 8px; left: 8px;
            background: rgba(255,60,60,.2);
            border: 1.5px solid rgba(255,80,80,.5);
            color: #ffb3b3; font-size: .78rem; font-weight: bold;
            padding: 6px 14px; border-radius: 20px;
            cursor: pointer; font-family: inherit;
        }
        .reset-btn:active { transform: scale(.94); }

        /* ── Game wrap ── */
        .game-wrap {
            position: relative; z-index: 1;
            width: min(460px, 96vw);
            min-height: 100svh;         /* fills the screen; grows (and body scrolls) only if it must */
            display: flex; flex-direction: column;
            gap: 7px;
            padding: 8px 12px;
            padding-bottom: max(18px, env(safe-area-inset-bottom));
        }
        /* Everything except the centre panel keeps its natural height */
        .ctrl-bar, .player-hint, .sym-row { flex-shrink: 0; }

        /* ── Player control bar (name + squishies) ── */
        .ctrl-bar {
            display: flex; align-items: center; gap: 8px;
        }
        .ctrl-bar.flipped { transform: rotate(180deg); }
        .name-input {
            flex: 1; min-width: 0;
            background: rgba(255,255,255,.12);
            border: 1.5px solid rgba(255,255,255,.3);
            border-radius: 20px;
            color: #fff; font-size: .9rem; font-weight: bold;
            padding: 7px 14px; font-family: inherit;
            outline: none; text-align: center; direction: rtl;
        }
        .name-input:focus { border-color: rgba(255,120,220,.8); background: rgba(255,255,255,.18); }
        .name-input::placeholder { color: rgba(255,255,255,.5); }
        .nav-link {
            background: rgba(255,255,255,.15);
            border: 1.5px solid rgba(255,255,255,.3);
            color: #fff; font-size: .78rem; font-weight: bold;
            padding: 7px 12px; border-radius: 20px;
            cursor: pointer; text-decoration: none;
            font-family: inherit; white-space: nowrap;
        }
        .mic-link {
            background: rgba(255,255,255,.15);
            border: 1.5px solid rgba(255,255,255,.3);
            color: #fff; font-size: 1rem;
            padding: 6px 10px; border-radius: 20px;
            cursor: pointer; font-family: inherit; line-height: 1;
        }
        .mic-link:active { transform: scale(.92); }

        /* ── Player hint labels ── */
        .player-hint {
            text-align: center;
            color: rgba(255,255,255,.7);
            font-size: .85rem;
            font-weight: bold;
            letter-spacing: .5px;
            padding: 1px 0;
        }
        .player-hint.flipped { transform: rotate(180deg); }

        /* ── Symbol rows ── */
        .sym-row {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .sym-row.flipped { transform: rotate(180deg); }

        .sym-btn {
            width: var(--btn);
            height: var(--btn);
            flex: 0 0 auto;
            background: radial-gradient(ellipse at 40% 30%, #8b28ef 0%, #4a0088 55%, #1e0044 100%);
            border: 2.5px solid rgba(255,255,255,.18);
            border-radius: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform .1s, box-shadow .1s;
            box-shadow: 0 4px 24px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.12);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .sym-btn:active { transform: scale(.88); }
        .sym-btn.x-btn  { border-color: rgba(255,50,50,.45); }
        .sym-btn.pl-btn { border-color: rgba(255,200,0,.45); }
        .sym-btn.ok-btn { border-color: rgba(50,230,80,.45); }

        .sym-icon {
            font-size: clamp(1.8rem, 7vw, 3rem);
            font-weight: 900;
            line-height: 1;
        }
        .x-icon  { color:#ff2222; text-shadow: 0 0 18px #ff0000, 0 0 36px #ff000055; }
        .pl-icon { color:#ffd700; text-shadow: 0 0 18px #ffaa00, 0 0 36px #ffaa0055; }
        .ok-icon { color:#22dd55; text-shadow: 0 0 18px #00ff55, 0 0 36px #00ff5555; }

        /* ── Centre panel ── */
        .centre {
            background: url('bg.png') center center / cover no-repeat;
            border: 2px solid rgba(255,255,255,.2);
            border-radius: 18px;
            box-shadow: 0 8px 40px rgba(0,0,0,.55);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1 1 auto;
            min-height: 110px;
        }
        .player-zone {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 6px;
            padding: 12px 16px;
            min-height: 0;
        }
        .player-zone.top { transform: rotate(180deg); border-bottom: 1.5px solid rgba(255,255,255,.15); }
        .player-zone.bottom { border-top: 1.5px solid rgba(255,255,255,.15); }

        .response-emoji {
            font-size: clamp(2rem, 9vw, 3.2rem);
            line-height: 1;
            animation: pop-in .35s cubic-bezier(.18,1.4,.4,1) both;
        }
        .response-text {
            font-size: clamp(1.1rem, 5vw, 1.8rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 14px rgba(255,255,255,.5), 0 2px 6px rgba(0,0,0,.95), 0 0 28px rgba(180,0,255,.7);
            text-align: center;
            animation: pop-in .35s cubic-bezier(.18,1.4,.4,1) both;
        }
        .idle-text {
            color: rgba(255,255,255,.75);
            font-size: .85rem;
            font-weight: bold;
            text-shadow: 0 1px 4px rgba(0,0,0,.9);
            text-align: center;
        }

        @keyframes pop-in {
            0%   { opacity:0; transform:scale(.5); }
            100% { opacity:1; transform:scale(1); }
        }

        /* ── Button flash ── */
        .flash-green  { animation: flash-g .45s ease; }
        .flash-yellow { animation: flash-y .45s ease; }
        .flash-red    { animation: flash-r .45s ease; }
        @keyframes flash-g { 0%,100%{box-shadow:0 4px 24px rgba(0,0,0,.45)} 45%{box-shadow:0 0 44px 10px #44ff88} }
        @keyframes flash-y { 0%,100%{box-shadow:0 4px 24px rgba(0,0,0,.45)} 45%{box-shadow:0 0 44px 10px #ffd700} }
        @keyframes flash-r { 0%,100%{box-shadow:0 4px 24px rgba(0,0,0,.45)} 45%{box-shadow:0 0 44px 10px #ff3333} }

        /* ── Reset confirm modal ── */
        .modal-bg {
            position: fixed; inset: 0; z-index: 300;
            background: rgba(5,0,20,.85);
            display: flex; align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(4px);
        }
        .modal-bg.hidden { display: none; }
        .modal {
            background: radial-gradient(ellipse at 50% 20%, #7a20df 0%, #400085 50%, #1a0044 100%);
            border: 2px solid rgba(255,80,80,.5);
            border-radius: 20px; padding: 26px 22px 20px;
            width: 100%; max-width: 320px; text-align: center;
            display: flex; flex-direction: column; gap: 16px;
            box-shadow: 0 12px 60px rgba(0,0,0,.7);
        }
        .modal p { color: rgba(255,255,255,.9); font-size: 1rem; line-height: 1.5; }
        .modal .warn { color:#ffb3b3; font-size:.85rem; }
        .btn-danger {
            background: linear-gradient(135deg,#ff2222,#aa0000);
            border: none; color: #fff; font-size: 1rem; font-weight: 900;
            padding: 12px; border-radius: 12px; cursor: pointer; font-family: inherit;
        }
        .btn-cancel {
            background: rgba(255,255,255,.1);
            border: 1.5px solid rgba(255,255,255,.2);
            color: #fff; font-size: 1rem; font-weight: bold;
            padding: 12px; border-radius: 12px; cursor: pointer; font-family: inherit;
        }

        /* flip whole modal for the top player */
        .modal-bg.flip .modal { transform: rotate(180deg); }

        /* ── Voice recording modal ── */
        .voice-modal {
            background: radial-gradient(ellipse at 50% 20%, #7a20df 0%, #400085 50%, #1a0044 100%);
            border: 2px solid rgba(255,255,255,.22);
            border-radius: 20px; padding: 22px 20px 18px;
            width: 100%; max-width: 360px;
            display: flex; flex-direction: column; gap: 14px;
            box-shadow: 0 12px 60px rgba(0,0,0,.7);
            max-height: 92vh; overflow-y: auto;
        }
        .voice-title {
            font-size: 1.25rem; font-weight: 900; text-align: center;
            background: linear-gradient(135deg,#ff77dd,#bb44ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .voice-hint { color: rgba(255,255,255,.6); font-size: .78rem; text-align: center; line-height: 1.5; }
        .v-row {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 12px; padding: 10px 12px;
        }
        .v-label { flex: 1; font-size: .92rem; font-weight: bold; color: #fff; }
        .v-status { font-size: .72rem; white-space: nowrap; }
        .v-status.has { color: #44ff88; }
        .v-status.rec { color: #ff5555; }
        .v-status.none { color: rgba(255,255,255,.4); }
        .v-btns { display: flex; gap: 5px; }
        .v-btn {
            background: rgba(255,255,255,.14);
            border: 1px solid rgba(255,255,255,.25);
            color: #fff; font-size: .95rem;
            padding: 6px 9px; border-radius: 9px;
            cursor: pointer; font-family: inherit; line-height: 1;
        }
        .v-btn.rec { background: rgba(255,50,50,.3); border-color: rgba(255,80,80,.6); }
        .v-btn.stop { background: rgba(255,180,0,.3); border-color: rgba(255,200,0,.6); }
        .v-btn.del { color: #ff8888; }
    </style>
</head>
<body>

<div id="stars"></div>
<div class="blob" style="width:340px;height:340px;background:#cc0044;top:8%;left:-5%;"></div>
<div class="blob" style="width:260px;height:260px;background:#8800ff;top:55%;right:-8%;"></div>
<div class="blob" style="width:220px;height:220px;background:#cc0033;bottom:5%;left:35%;"></div>

<button class="reset-btn" onclick="openReset()">🔄 אתחול משחק</button>

<div class="game-wrap">

    <!-- Player 2 (top) — flipped -->
    <div class="ctrl-bar flipped">
        <input class="name-input" id="nameP2" placeholder="השם שלי..." maxlength="20" oninput="saveName('p2',this.value)">
        <button class="mic-link" onclick="openVoice('p2')" title="הקלטות קול">🎤</button>
        <a class="nav-link" href="squishies.html">🧸 הסקוויישים שלי</a>
    </div>
    <div class="player-hint flipped">לחצי על כפתור ✓ + ✗</div>
    <div class="sym-row flipped">
        <button class="sym-btn ok-btn" onclick="respond('ok','top')"><span class="sym-icon ok-icon">✓</span></button>
        <button class="sym-btn pl-btn" onclick="respond('+','top')"><span class="sym-icon pl-icon">+</span></button>
        <button class="sym-btn x-btn"  onclick="respond('x','top')"><span class="sym-icon x-icon">✗</span></button>
    </div>

    <!-- Centre panel with two response zones -->
    <div class="centre">
        <div class="player-zone top" id="zoneTop">
            <div class="idle-text">לחצי על כפתור ✓ + ✗</div>
        </div>
        <div class="player-zone bottom" id="zoneBottom">
            <div class="idle-text">לחצי על כפתור ✓ + ✗</div>
        </div>
    </div>

    <!-- Player 1 (bottom) — normal -->
    <div class="sym-row">
        <button class="sym-btn ok-btn" onclick="respond('ok','bottom')"><span class="sym-icon ok-icon">✓</span></button>
        <button class="sym-btn pl-btn" onclick="respond('+','bottom')"><span class="sym-icon pl-icon">+</span></button>
        <button class="sym-btn x-btn"  onclick="respond('x','bottom')"><span class="sym-icon x-icon">✗</span></button>
    </div>
    <div class="player-hint">לחצי על כפתור ✓ + ✗</div>
    <div class="ctrl-bar">
        <input class="name-input" id="nameP1" placeholder="השם שלי..." maxlength="20" oninput="saveName('p1',this.value)">
        <button class="mic-link" onclick="openVoice('p1')" title="הקלטות קול">🎤</button>
        <a class="nav-link" href="squishies.html">🧸 הסקוויישים שלי</a>
    </div>

</div>

<!-- ── Voice recording modal ── -->
<div class="modal-bg hidden" id="voiceBg">
    <div class="voice-modal">
        <div class="voice-title" id="voiceTitle">🎤 ההקלטות שלי</div>
        <div class="voice-hint">הקליטי קול לכל כפתור (עד 3 שניות).<br>הקול יישמע כשלוחצים על הכפתור.</div>
        <div id="voiceRows"></div>
        <button class="btn-cancel" onclick="closeVoice()">סגירה</button>
    </div>
</div>

<!-- ── Reset confirm modal ── -->
<div class="modal-bg hidden" id="resetBg">
    <div class="modal">
        <div style="font-size:2.5rem">🔄</div>
        <p>לאתחל את המשחק?</p>
        <p class="warn">כל הסקוויישים והשמות יימחקו לצמיתות!</p>
        <button class="btn-danger" onclick="doReset()">כן, אתחל הכל!</button>
        <button class="btn-cancel" onclick="closeReset()">ביטול</button>
    </div>
</div>

<script>
// ── Stars ──
(function(){
    const c = document.getElementById('stars');
    for(let i=0;i<55;i++){
        const s=document.createElement('div'); s.className='star';
        const sz=6+Math.random()*22;
        s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${1.3+Math.random()*2.2}s;--delay:${Math.random()*3}s`;
        c.appendChild(s);
    }
})();

// ── Player names (saved to localStorage) ──
const NAME_KEYS = { p1:'playerName_p1', p2:'playerName_p2' };

function loadNames(){
    document.getElementById('nameP1').value = localStorage.getItem(NAME_KEYS.p1) || '';
    document.getElementById('nameP2').value = localStorage.getItem(NAME_KEYS.p2) || '';
}
function saveName(player, val){
    localStorage.setItem(NAME_KEYS[player], val.trim());
}
loadNames();

// ── Responses ──
const RESPONSES = {
    ok: { emoji: '🥰', text: 'תודה' },
    '+': { emoji: '🙏', text: 'תוסיפי בבקשה' },
    x:  { emoji: '😒', text: 'לא שווה לי' }
};
const FLASH = { ok: 'flash-green', '+': 'flash-yellow', x: 'flash-red' };
const IDLE_HTML = '<div class="idle-text">לחצי על כפתור ✓ + ✗</div>';
const clearTimers = { top: null, bottom: null };

function respond(type, player) {
    const { emoji, text } = RESPONSES[type];
    playVoice(player, type);
    const zone = document.getElementById(player === 'top' ? 'zoneTop' : 'zoneBottom');
    zone.innerHTML = `
        <div class="response-emoji">${emoji}</div>
        <div class="response-text">${text}</div>
    `;
    clearTimeout(clearTimers[player]);
    clearTimers[player] = setTimeout(() => { zone.innerHTML = IDLE_HTML; }, 3000);

    const cls = FLASH[type];
    const btnClass = type === 'ok' ? 'ok-btn' : type === '+' ? 'pl-btn' : 'x-btn';
    const row = player === 'top'
        ? document.querySelector('.sym-row.flipped')
        : document.querySelectorAll('.sym-row')[1];
    row.querySelectorAll('.' + btnClass).forEach(b => {
        b.classList.remove('flash-green','flash-yellow','flash-red');
        void b.offsetWidth;
        b.classList.add(cls);
        setTimeout(() => b.classList.remove(cls), 500);
    });
}

// ── Voice recordings (per player, per action) ──
// button "player" arg is 'top'/'bottom'; storage uses 'p2'/'p1'
const VOICE_ACTIONS = [
    { type:'ok', key:'ok',   label:'🥰 תודה' },
    { type:'+',  key:'plus', label:'🙏 תוסיפי בבקשה' },
    { type:'x',  key:'x',    label:'😒 לא שווה לי' }
];
function zoneToPlayer(z){ return z === 'top' ? 'p2' : 'p1'; }
function actionKey(type){ return type === '+' ? 'plus' : type; }
function voiceKey(pk, key){ return `voice_${pk}_${key}`; }

// Play a player's recording for this action; fall back to spoken Hebrew
function playVoice(zone, type){
    const pk = zoneToPlayer(zone);
    const data = localStorage.getItem(voiceKey(pk, actionKey(type)));
    if (data){
        const a = new Audio(data);
        a.play().catch(()=>{});
    } else if (window.speechSynthesis){
        try {
            const u = new SpeechSynthesisUtterance(RESPONSES[type].text);
            u.lang = 'he-IL'; u.rate = 1;
            speechSynthesis.cancel();
            speechSynthesis.speak(u);
        } catch(e){}
    }
}

// ── Recording state ──
let curVoicePlayer = 'p1';       // 'p1' | 'p2'
let mediaRec = null, recChunks = [], recStream = null, recTimer = null, recActive = null;

function openVoice(pk){
    curVoicePlayer = pk;
    document.getElementById('voiceTitle').textContent = '🎤 ההקלטות של ' +
        ((localStorage.getItem(NAME_KEYS[pk])||'').trim() || (pk==='p1'?'שחקנית 1':'שחקנית 2'));
    const bg = document.getElementById('voiceBg');
    bg.classList.toggle('flip', pk === 'p2');   // face the top player
    renderVoiceRows();
    bg.classList.remove('hidden');
}
function closeVoice(){
    if (recActive) stopRec();
    document.getElementById('voiceBg').classList.add('hidden');
}

function renderVoiceRows(){
    const pk = curVoicePlayer;
    const rows = VOICE_ACTIONS.map(a=>{
        const has = !!localStorage.getItem(voiceKey(pk, a.key));
        const recording = recActive && recActive.pk === pk && recActive.key === a.key;
        let status, btns;
        if (recording){
            status = '<span class="v-status rec">🔴 מקליט...</span>';
            btns = `<button class="v-btn stop" onclick="stopRec()">⏹</button>`;
        } else {
            status = has ? '<span class="v-status has">✅ מוקלט</span>'
                         : '<span class="v-status none">—</span>';
            btns = `<button class="v-btn rec" onclick="startRec('${pk}','${a.key}')">🎤</button>`;
            if (has){
                btns += `<button class="v-btn" onclick="previewVoice('${pk}','${a.key}')">▶️</button>`;
                btns += `<button class="v-btn del" onclick="delVoice('${pk}','${a.key}')">🗑️</button>`;
            }
        }
        return `<div class="v-row" style="margin-bottom:8px">
            <span class="v-label">${a.label}</span>
            ${status}
            <span class="v-btns">${btns}</span>
        </div>`;
    }).join('');
    document.getElementById('voiceRows').innerHTML = rows;
}

async function startRec(pk, key){
    if (recActive) return;
    if (!navigator.mediaDevices || !window.MediaRecorder){
        alert('הדפדפן לא תומך בהקלטה'); return;
    }
    try {
        recStream = await navigator.mediaDevices.getUserMedia({ audio:true });
    } catch(e){
        alert('צריך לאשר גישה למיקרופון 🎤'); return;
    }
    recChunks = [];
    let mime = '';
    if (MediaRecorder.isTypeSupported('audio/webm')) mime = 'audio/webm';
    else if (MediaRecorder.isTypeSupported('audio/mp4')) mime = 'audio/mp4';
    mediaRec = mime ? new MediaRecorder(recStream,{mimeType:mime}) : new MediaRecorder(recStream);
    recActive = { pk, key };
    mediaRec.ondataavailable = e => { if (e.data && e.data.size) recChunks.push(e.data); };
    mediaRec.onstop = () => {
        const blob = new Blob(recChunks, { type: mediaRec.mimeType || 'audio/webm' });
        const reader = new FileReader();
        reader.onload = () => {
            try { localStorage.setItem(voiceKey(pk, key), reader.result); }
            catch(err){ alert('ההקלטה גדולה מדי, נסי הקלטה קצרה יותר'); }
            recActive = null;
            renderVoiceRows();
        };
        reader.readAsDataURL(blob);
        if (recStream) recStream.getTracks().forEach(t=>t.stop());
    };
    mediaRec.start();
    renderVoiceRows();                       // show "recording" state
    recTimer = setTimeout(stopRec, 3000);    // auto-stop after 3s
}
function stopRec(){
    clearTimeout(recTimer);
    if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
}
function previewVoice(pk, key){
    const data = localStorage.getItem(voiceKey(pk, key));
    if (data){ const a = new Audio(data); a.play().catch(()=>{}); }
}
function delVoice(pk, key){
    localStorage.removeItem(voiceKey(pk, key));
    renderVoiceRows();
}

document.getElementById('voiceBg').addEventListener('click',e=>{
    if (e.target === document.getElementById('voiceBg')) closeVoice();
});

// ── Reset game ──
function openReset(){ document.getElementById('resetBg').classList.remove('hidden'); }
function closeReset(){ document.getElementById('resetBg').classList.add('hidden'); }
function doReset(){
    // clear all stored data
    localStorage.removeItem('squishies_p1');
    localStorage.removeItem('squishies_p2');
    localStorage.removeItem(NAME_KEYS.p1);
    localStorage.removeItem(NAME_KEYS.p2);
    ['p1','p2'].forEach(pk => VOICE_ACTIONS.forEach(a =>
        localStorage.removeItem(voiceKey(pk, a.key))));
    // reset the board
    document.getElementById('nameP1').value = '';
    document.getElementById('nameP2').value = '';
    document.getElementById('zoneTop').innerHTML = IDLE_HTML;
    document.getElementById('zoneBottom').innerHTML = IDLE_HTML;
    clearTimeout(clearTimers.top);
    clearTimeout(clearTimers.bottom);
    closeReset();
}

document.getElementById('resetBg').addEventListener('click',e=>{
    if(e.target===document.getElementById('resetBg')) closeReset();
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeReset(); closeVoice(); } });
</script>
</body>
